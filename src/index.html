<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Binary Search Tree</title>
  
</head>
<body>
  <main>
    <!-- Main container for the application -->
    <div class="container">
      <!-- Section containing buttons for BST actions -->
      <section>
        <div class="buttons-container bst-actions-container">
           <!-- Buttons for performing actions on the binary search tree -->
        </div>
      </section>
      <!-- Section containing the application container -->
      <section>
        <div class="app-container">
           <!-- Container for displaying the binary search tree -->
          <div class="tree">
            <!-- Root node of the binary search tree -->
            <div class="node node--root"></div>
          </div>
        </div>
      </section>
      <!-- Saved Trees Sidebar -->
      <aside class="saved-trees-sidebar">
        <!-- Title for the saved trees section -->
        <h2 class="saved-trees-title">Saved Trees</h2>
         <!-- Button to delete all saved trees -->
        <button id="delete-all-trees" class="btn btn-danger">Delete All Trees</button>
        <!-- Button to retrieve saved trees -->
        <button id="retrieveBtn" class="btn btn-info">Retrieve Trees</button>
        <!-- Container for displaying the list of saved trees -->
        <div id="savedTreesList" class="saved-trees-list">
          <!-- List of saved trees -->
        </div>
      </aside>
    </div>
  </main>
</body>
</html>
